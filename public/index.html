<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#C8102E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="부산아이파크 유스 메디컬 관리 시스템" />
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/lucide-react/lucide/main/icons/shield.svg" />
    
    <title>부산아이파크 메디컬 시스템</title>
    
    <!-- Tailwind CSS (디자인 프레임워크) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
      /* 폰트 설정 및 기본 스타일 */
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
      
      :root {
        --busan-red: #C8102E;
      }

      body {
        font-family: 'Noto Sans KR', sans-serif;
        background-color: #f9fafb;
        margin: 0;
        -webkit-tap-highlight-color: transparent;
      }

      /* 스크롤바 숨기기 (깔끔한 UI용) */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* 로딩 중일 때 보여줄 스타일 */
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: white;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
    </style>
  </head>
  <body>
    <noscript>이 앱을 실행하려면 자바스크립트 활성화가 필요합니다.</noscript>
    
    <!-- 앱이 로딩되는 동안 보여줄 화면 (빈 화면 방지) -->
    <div id="root">
      <div id="initial-loader">
        <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--busan-red); border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 16px; font-weight: 900; color: var(--busan-red); font-size: 14px;">BUSAN IPARK MEDICAL</p>
      </div>
    </div>

    <style>
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </body>
</html>
